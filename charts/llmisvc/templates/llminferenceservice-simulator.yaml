{{- range $name, $model := .Values.models }}
---
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: {{ $name }}
  namespace: {{ $model.namespace | default $.Values.namespace.name }}
spec:
  model:
    uri: {{ $model.model.uri | quote }}
    name: {{ $model.model.name | quote }}
  replicas: {{ $model.replicas | default 1 }}
  router:
    route: {}
    gateway:
      refs:
        - name: {{ ($model.gateway).name | default $.Values.simulatorDefaults.gateway.name }}
          namespace: {{ ($model.gateway).namespace | default $.Values.simulatorDefaults.gateway.namespace }}
  template:
    containers:
      - name: main
        image: {{ $model.image | default $.Values.simulatorDefaults.image | quote }}
        imagePullPolicy: Always
        command: ["/app/llm-d-inference-sim"]
        args:
          - --port
          - "8000"
          - --model
          - {{ $model.model.name | quote }}
          - --mode
          - random
          - --ssl-certfile
          - /var/run/kserve/tls/tls.crt
          - --ssl-keyfile
          - /var/run/kserve/tls/tls.key
        env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: metadata.namespace
        ports:
          - name: https
            containerPort: 8000
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: https
            scheme: HTTPS
        readinessProbe:
          httpGet:
            path: /ready
            port: https
            scheme: HTTPS
        resources:
          {{- toYaml ($model.resources | default $.Values.simulatorDefaults.resources) | nindent 10 }}
{{- end }}
