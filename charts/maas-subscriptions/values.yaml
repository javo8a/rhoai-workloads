subscriptions:
  free-models-subscription:
    displayName: Free Models Subscription
    priority: 0
    groups:
      - name: system:authenticated
    models:
      simulated-free:
        namespace: ai-models
        tokenRateLimits:
          - limit: 1000
            window: 5m
  premium-models-subscription:
    displayName: Premium Models Subscription
    priority: 1
    groups:
      - name: premium-users
    models:
      simulated-premium:
        namespace: ai-models
        tokenRateLimits:
          - limit: 10000
            window: 2m

modelRefs:
  simulated-free:
    namespace: ai-models
    tier: free
  simulated-premium:
    namespace: ai-models
    tier: premium

authPolicies:
  free-models-access:
    namespace: models-as-a-service
    tier: free
    description: Access policy for free tier models
    modelRefs:
      - name: simulated-free
        namespace: ai-models
    groups:
      - name: system:authenticated
  premium-models-access:
    namespace: models-as-a-service
    tier: premium
    description: Access policy for premium tier models
    modelRefs:
      - name: simulated-premium
        namespace: ai-models
    groups:
      - name: system:authenticated
      - name: premium-users

# bootstrap.sh: enable telemetry on default-tenant
tenantTelemetry:
  enabled: true
